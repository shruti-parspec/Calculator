name: Claude Code

# Claude runs when someone mentions @claude in an issue or pull-request comment.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

# Least privilege: only what @claude needs to read the repo, push a branch,
# open/update a PR, comment on issues/PRs, and read CI results. Nothing else.
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read
  id-token: write   # required: the action mints an OIDC token to authenticate as the GitHub App

jobs:
  claude:
    # Only spin up a runner when someone actually types @claude.
    # The action additionally refuses to act for anyone without WRITE access
    # to this repo, so a drive-by comment from a stranger cannot trigger changes.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Claude has context

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pin the base model (drops the [1m] 1M-context beta variant, which a
          # fresh org may not have access to) and cap turns per invocation.
          claude_args: "--model claude-opus-4-8 --max-turns 15"
